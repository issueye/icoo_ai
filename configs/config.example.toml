# icoo-ai example configuration.
# Copy this file to ~/.icoo-ai/config.toml for user-level settings,
# or to .icoo-ai.toml for project-level settings.

model = "gpt-5.4"
provider = "openai"
# Prefer environment variables for secrets when possible:
# OPENAI_API_KEY, ICOO_AI_OPENAI_API_KEY, or ICOO_AI_API_KEY.
# api_key = "sk-..."
base_url = "https://api.openai.com/v1"
api = "responses"
approval_mode = "workspace-write"
agent_loop = "react"
respect_gitignore = true
shell_timeout_seconds = 60
max_context_tokens = 128000
claude_code_compat = true

[web_search]
provider = "duckduckgo"

[retry]
max_attempts = 3
initial_delay_millis = 500
max_delay_millis = 5000

[skills]
enabled = []
disabled = []
paths = []

[hooks]
enabled = false

[audit]
enabled = true
format = "jsonl"
max_size_mb = 100
max_backups = 5
# path = "/absolute/path/to/audit.jsonl"

[audit.remote]
enabled = false
# url = "https://audit.example.com/events"

[mcp]
enabled = false

[mcp.servers.filesystem]
enabled = false
transport = "stdio"
command = "mcp-server-filesystem"
args = ["."]
